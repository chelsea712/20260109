<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 · 经典HTML5</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1a3636 0%, #0b2222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .game-wrapper {
            background: #1f4a4a;
            padding: 25px 25px 30px;
            border-radius: 50px;
            box-shadow: 0 20px 0 #0d2b2b, 0 15px 30px rgba(0, 0, 0, 0.7);
            border: 2px solid #67a3a3;
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding: 0 12px;
        }
        .score-display {
            background: #1b3535;
            color: #c7ffb1;
            font-size: 2rem;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            border: 2px solid #6da5a5;
            box-shadow: inset 0 -5px 0 #0b2121;
            letter-spacing: 2px;
            text-shadow: 0 3px 0 #1f4a4a;
        }
        .reset-button {
            background: #eab47a;
            border: none;
            color: #1e3a3a;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 7px 0 #9e7a50, 0 5px 15px black;
            transition: all 0.05s linear;
            border: 1px solid #ffdbb5;
        }
        .reset-button:active {
            transform: translateY(6px);
            box-shadow: 0 1px 0 #9e7a50;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 30px;
            background-color: #1e3d3d;
            box-shadow: inset 0 0 0 3px #5f9f9f, 0 10px 15px rgba(0, 0, 0, 0.5);
            width: 400px;
            height: 400px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .info-tip {
            color: #b4e0b4;
            text-align: center;
            margin-top: 18px;
            font-size: 1.25rem;
            font-weight: bold;
            text-shadow: 2px 2px 0 #154242;
            letter-spacing: 1px;
        }
        .info-tip span {
            background: #173b3b;
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="header-panel">
            <div class="score-display" id="scoreDisplay">0</div>
            <button class="reset-button" id="restartBtn">↻ 重来</button>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="info-tip">
            <span>⬆ ⬇ ⬅ ➡   ·   空格暂停</span>
        </div>
    </div>
    <script>
        (function() {
            // ---------- 配置参数 ----------
            const GRID_SIZE = 20;          // 20x20 网格
            const CELL_SIZE = 20;           // 像素 400/20
            const TICK_INTERVAL_MS = 150;    // 移动间隔(毫秒)

            // ---------- 游戏状态变量 ----------
            let snake = [];                  // 坐标数组 [x,y]
            let food = { x: 6, y: 10 };
            let direction = 'RIGHT';          // 当前移动方向
            let nextDirection = 'RIGHT';       // 解缓冲方向
            let score = 0;
            let gameOver = false;
            let winFlag = false;               // 是否胜利(网格填满)
            let paused = false;
            let gameInterval = null;

            // DOM 元素
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const scoreSpan = document.getElementById('scoreDisplay');

            // ---------- 初始化/重置 ----------
            function initGame() {
                // 经典蛇: 长度为3, 水平放置
                snake = [
                    [8, 10],   // 头 (x, y)
                    [7, 10],
                    [6, 10]
                ];
                direction = 'RIGHT';
                nextDirection = 'RIGHT';
                score = 0;
                gameOver = false;
                winFlag = false;
                paused = false;            // 重置时强制取消暂停
                updateScore();
                generateFood();             // 随机生成食物，避开蛇身
                drawCanvas();
            }

            // 生成食物 (且保证不落在蛇身上)
            function generateFood() {
                if (gameOver) return;

                const totalCells = GRID_SIZE * GRID_SIZE;
                if (snake.length >= totalCells) {
                    // 蛇已经占满网格 → 胜利
                    winFlag = true;
                    gameOver = true;
                    drawCanvas();
                    return;
                }

                // 收集所有空闲格子
                const freeCells = [];
                // 为了提高性能可以用set，但20x20=400，双重循环也没问题
                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE; x++) {
                        if (!snake.some(segment => segment[0] === x && segment[1] === y)) {
                            freeCells.push([x, y]);
                        }
                    }
                }

                if (freeCells.length === 0) {
                    // 没有空闲格子 → 胜利
                    winFlag = true;
                    gameOver = true;
                    drawCanvas();
                    return;
                }

                const randomIndex = Math.floor(Math.random() * freeCells.length);
                const [fx, fy] = freeCells[randomIndex];
                food = { x: fx, y: fy };
            }

            // 更新页面分数
            function updateScore() {
                scoreSpan.textContent = score;
            }

            // ---------- 蛇的移动逻辑 ----------
            function moveSnake() {
                if (gameOver || paused) return;

                // 1) 采用缓冲方向，并防止立即反向
                let newDir = nextDirection;
                const opposite = {
                    'UP': 'DOWN', 'DOWN': 'UP', 'LEFT': 'RIGHT', 'RIGHT': 'LEFT'
                };
                // 不允许原地掉头 (且蛇长度>1时)
                if (snake.length > 1 && opposite[newDir] === direction) {
                    newDir = direction;  // 保持原方向
                }
                direction = newDir;
                nextDirection = direction;  // 同步，避免积累

                // 2) 计算新头部
                const head = snake[0];
                let newHeadX = head[0];
                let newHeadY = head[1];

                switch (direction) {
                    case 'RIGHT': newHeadX++; break;
                    case 'LEFT':  newHeadX--; break;
                    case 'UP':    newHeadY--; break;
                    case 'DOWN':  newHeadY++; break;
                }

                // 3) 检查食物碰撞 (先检查, 因为需要知道是否该长大)
                const isEating = (newHeadX === food.x && newHeadY === food.y);

                // 4) 构建新蛇 (先插入新头)
                let newSnake = [[newHeadX, newHeadY], ...snake];

                if (!isEating) {
                    // 没吃到食物: 移除尾部
                    newSnake.pop();
                }

                // 5) 碰撞检测 (边界 & 自身)
                const headCollision =
                    newHeadX < 0 || newHeadX >= GRID_SIZE || newHeadY < 0 || newHeadY >= GRID_SIZE ||
                    newSnake.slice(1).some(segment => segment[0] === newHeadX && segment[1] === newHeadY);

                if (headCollision) {
                    gameOver = true;
                    winFlag = false;    // 普通失败
                    drawCanvas();
                    return;             // 停止, 保留newSnake仅用于绘制? 但snake未更新，我们会统一更新
                }

                // 6) 没有碰撞 → 更新 snake
                snake = newSnake;

                // 7) 如果吃到食物: 加分 + 生成新食物
                if (isEating) {
                    score++;
                    updateScore();
                    generateFood();      // 内部检查胜利条件
                    if (gameOver) {       // 如果在generateFood里触发了胜利，需要绘制并停止
                        drawCanvas();
                        return;
                    }
                }

                // 8) 检查蛇是否占满(由于generateFood已经检查，但以防万一)
                if (snake.length >= GRID_SIZE * GRID_SIZE) {
                    winFlag = true;
                    gameOver = true;
                }

                // 重绘画布
                drawCanvas();
            }

            // ---------- 绘制 ----------
            function drawCanvas() {
                ctx.clearRect(0, 0, 400, 400);

                // 绘制网格线 (浅暗线)
                ctx.strokeStyle = '#2b5f5f';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#3b6f6f';
                    ctx.lineWidth = 0.5;
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, 400);
                    ctx.stroke();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(400, i * CELL_SIZE);
                    ctx.stroke();
                }

                // 绘制食物
                ctx.fillStyle = '#ff7b7b';
                ctx.shadowColor = '#ffd0a0';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.shadowColor = 'transparent';

                // 绘制蛇身体 (从尾画到头, 头部高亮)
                for (let i = snake.length - 1; i >= 0; i--) {
                    const [x, y] = snake[i];
                    const isHead = (i === 0);
                    const cx = x * CELL_SIZE;
                    const cy = y * CELL_SIZE;

                    // 身体颜色渐变
                    if (isHead) {
                        ctx.fillStyle = '#c4f2b0';   // 亮绿头
                    } else {
                        // 越靠近头部稍微亮一点
                        const intensity = 0.6 + (i / snake.length) * 0.3;
                        ctx.fillStyle = `rgb(80, 160, 80)`;
                    }
                    // 圆角方形
                    ctx.fillStyle = isHead ? '#daffb8' : '#56b56e';
                    ctx.shadowBlur = isHead ? 12 : 6;
                    ctx.shadowColor = '#b2ffb2';
                    ctx.fillRect(cx + 2, cy + 2, CELL_SIZE - 4, CELL_SIZE - 4);

                    // 眼睛（头部）
                    if (isHead) {
                        ctx.fillStyle = '#111122';
                        ctx.shadowBlur = 0;
                        // 根据方向画瞳孔 (小趣味)
                        const eyeOffset = 5;
                        if (direction === 'RIGHT') {
                            ctx.fillRect(cx + 13, cy + 5, 3, 3);
                            ctx.fillRect(cx + 13, cy + 12, 3, 3);
                        } else if (direction === 'LEFT') {
                            ctx.fillRect(cx + 4, cy + 5, 3, 3);
                            ctx.fillRect(cx + 4, cy + 12, 3, 3);
                        } else if (direction === 'UP') {
                            ctx.fillRect(cx + 5, cy + 4, 3, 3);
                            ctx.fillRect(cx + 12, cy + 4, 3, 3);
                        } else if (direction === 'DOWN') {
                            ctx.fillRect(cx + 5, cy + 13, 3, 3);
                            ctx.fillRect(cx + 12, cy + 13, 3, 3);
                        } else {
                            // 默认
                            ctx.fillRect(cx + 13, cy + 5, 3, 3);
                            ctx.fillRect(cx + 13, cy + 12, 3, 3);
                        }
                    }
                }
                ctx.shadowBlur = 0;

                // 绘制游戏结束或胜利蒙层
                if (gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.font = 'bold 28px "Courier New", monospace';
                    ctx.fillStyle = '#f4d793';
                    ctx.shadowColor = '#302012';
                    ctx.shadowBlur = 10;
                    ctx.textAlign = 'center';
                    if (winFlag) {
                        ctx.fillText('🏆 胜利', 200, 220);
                    } else {
                        ctx.fillText('💀 游戏结束', 200, 220);
                    }
                    ctx.shadowBlur = 0;
                } else if (paused) {
                    ctx.fillStyle = 'rgba(45, 70, 70, 0.7)';
                    ctx.fillRect(0, 0, 400, 400);
                    ctx.font = 'bold 26px "Courier New", monospace';
                    ctx.fillStyle = '#b2e6d9';
                    ctx.shadowColor = '#143333';
                    ctx.shadowBlur = 6;
                    ctx.textAlign = 'center';
                    ctx.fillText('⏸ 暂停', 200, 220);
                    ctx.shadowBlur = 0;
                }

                // 绘制调试小提示（可忽略）
            }

            // ---------- 键盘控制 ----------
            function handleKeydown(e) {
                const key = e.key;
                // 阻止页面滚动
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(key)) {
                    e.preventDefault();
                }

                if (gameOver) return;  // 游戏结束不响应方向，但空格可点重启按钮

                // 暂停/继续 (空格键)
                if (key === ' ') {
                    paused = !paused;
                    drawCanvas();
                    return;
                }

                // 方向映射 (只接受箭头键)
                let desiredDir = null;
                if (key === 'ArrowRight') desiredDir = 'RIGHT';
                else if (key === 'ArrowLeft') desiredDir = 'LEFT';
                else if (key === 'ArrowUp') desiredDir = 'UP';
                else if (key === 'ArrowDown') desiredDir = 'DOWN';
                else return;

                // 设置缓冲方向 (移动时会校验反向)
                if (desiredDir) {
                    nextDirection = desiredDir;
                }
            }

            // 重启游戏
            function restartGame() {
                // 清除原有循环 (如果有)
                if (gameInterval) {
                    clearInterval(gameInterval);
                }
                initGame();  // 重置所有
                // 启动新循环
                gameInterval = setInterval(() => moveSnake(), TICK_INTERVAL_MS);
            }

            // ---------- 启动 ----------
            window.addEventListener('load', () => {
                initGame();
                if (gameInterval) clearInterval(gameInterval);
                gameInterval = setInterval(() => moveSnake(), TICK_INTERVAL_MS);

                // 键盘监听
                window.addEventListener('keydown', handleKeydown);

                // 按钮监听
                document.getElementById('restartBtn').addEventListener('click', restartGame);

                // 可选：失去焦点时暂停？不需要，但可以保证canvas不滚动
                // 防止页面使用方向键滚动 (再次确保)
                window.addEventListener('keyup', (e) => {
                    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                        e.preventDefault();
                    }
                });
            });

            // 清理定时器 (可选, 但以防页面跳转)
            window.addEventListener('beforeunload', () => {
                if (gameInterval) clearInterval(gameInterval);
            });

        })();
    </script>
</body>
</html>
